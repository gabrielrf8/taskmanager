{% extends 'tasks/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger border-0 shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirmar Exclusão</h5>
            </div>
            <div class="card-body text-center py-4">
                <p class="fs-5">Tem certeza que deseja deletar a tarefa:</p>
                <p class="fw-bold fs-4">"{{ tarefa.titulo }}"</p>
                <p class="text-muted">Esta ação não pode ser desfeita.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Sim, deletar
                        </button>
                        <a href="/" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg me-1"></i>Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
