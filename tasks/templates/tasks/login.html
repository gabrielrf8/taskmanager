<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Gerenciador de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { border-radius: 16px; }
        .btn-github {
            background-color: #24292e;
            color: white;
            border: none;
            font-size: 1.05rem;
            padding: 12px 24px;
        }
        .btn-github:hover { background-color: #1a1e22; color: white; }
    </style>
</head>
<body>
    <div class="card shadow-lg" style="width: 380px;">
        <div class="card-body p-5 text-center">
            <i class="bi bi-check2-square text-primary" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-3 mb-1">Gerenciador de Tarefas</h3>
            <p class="text-muted mb-4">Faça login para acessar suas tarefas</p>

            {% if error %}
                <div class="alert alert-danger py-2 small">
                    Erro ao autenticar com o GitHub. Tente novamente.
                </div>
            {% endif %}

            <a href="/auth/login/github/" class="btn btn-github w-100 rounded-pill">
                <i class="bi bi-github me-2"></i>Entrar com GitHub
            </a>

            <p class="text-muted small mt-4 mb-0">
                Suas tarefas ficam vinculadas à sua conta GitHub.
            </p>
        </div>
    </div>
</body>
</html>
